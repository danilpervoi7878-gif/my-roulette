 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --accent-color: #00d2ff;
            --second-accent: #9d50bb;
            --glass: rgba(255, 255, 255, 0.07);
        }
        body { 
            background: radial-gradient(circle at top, #1b112e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 20px; color: white; min-height: 100vh; overflow: hidden;
        }
        .header {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 10px 40px; text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-value { font-size: 32px; font-weight: 900; color: var(--accent-color); text-shadow: 0 0 15px var(--accent-color); }
        
        .wheel-box { position: relative; width: 310px; height: 310px; margin-top: 10px; }
        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.2)); }
        
        .arrow { 
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%) rotate(180deg);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid var(--accent-color); z-index: 10; filter: drop-shadow(0 0 10px var(--accent-color));
        }

        .main-btn { 
            margin-top: 40px; background: linear-gradient(45deg, var(--second-accent), var(--accent-color));
            color: white; border: none; width: 85%; padding: 18px; font-size: 20px; 
            border-radius: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3); transition: 0.2s;
        }
        .main-btn:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; letter-spacing: 2px; opacity: 0.5;">WALLET</div>
        <div class="balance-value">2,500 💎</div>
    </div>

    <div class="wheel-box">
        <div class="arrow"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <button class="main-btn" id="spinBtn" onclick="spin()">Start Mission</button>

    <script>
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sectors = ["🍎", "💰", "⭐", "🎲", "🚀", "💎", "⚡", "🔥", "🌈", "🏆", "🎯", "🎰"];
        
        // Звуки (используем вибрацию Telegram как альтернативу звуку, если браузер блокирует аудио)
        function playTick() { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }

        function drawWheel() {
            const arc = (2 * Math.PI) / sectors.length;
            for (let i = 0; i < sectors.length; i++) {
                const angle = i * arc;
                ctx.fillStyle = (i % 2 === 0) ? "#1a1a2e" : "#242445";
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, angle, angle + arc); ctx.fill();
                
                ctx.strokeStyle = "rgba(0, 210, 255, 0.3)";
                ctx.lineWidth = 2; ctx.stroke();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
                ctx.fillStyle = "white"; ctx.font = "bold 40px Arial";
                ctx.textAlign = "right"; ctx.fillText(sectors[i], 220, 15); ctx.restore();
            }
            // Ободок
            ctx.strokeStyle = "#00d2ff"; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(250, 250, 240, 0, 2*Math.PI); ctx.stroke();
        }
        
        window.onload = () => { drawWheel(); tg.expand(); };

        function spin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            tg.sendData("spin_request");
            
            const rotation = Math.floor(4000 + Math.random() * 4000);
            canvas.style.transform = `rotate(${rotation}deg)`;
            
            // Имитация звука через вибрацию при нажатии
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            setTimeout(() => { tg.close(); }, 4500);
        }
        tg.ready();
    </script>
</body>
</html>

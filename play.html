 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #2c0a0a; --gold: #d4af37; --soft-gold: #fcf1d1; --dark: #050505; }
        body { 
            background: radial-gradient(circle at top, var(--wine) 0%, var(--dark) 100%);
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px 20px; color: var(--soft-gold); 
            height: 100vh; overflow: hidden;
        }

        @keyframes balance-glow {
            0%, 100% { text-shadow: 0 0 5px var(--gold); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--gold), 0 0 30px #fff; transform: scale(1.05); }
        }

        .header { 
            background: rgba(212, 175, 55, 0.07); padding: 10px 30px; border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.3); margin-top: 15px;
            animation: balance-glow 3s infinite ease-in-out;
        }
        .balance { font-size: 32px; font-weight: 800; color: var(--gold); }
        
        @keyframes gift-wiggle {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-10deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.1); }
        }
        .info-btn {
            position: absolute; right: 20px; top: 25px; width: 42px; height: 42px;
            background: rgba(212, 175, 55, 0.15); border: 1.5px solid var(--gold);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; z-index: 100; animation: gift-wiggle 2s infinite ease-in-out;
        }

        .wheel-container { position: relative; width: 330px; height: 330px; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
        .lights-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #111; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .led { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 6px; left: 50%; transform: translateX(-50%); z-index: 5; }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 28px solid #ffffff; z-index: 110; filter: drop-shadow(0 0 8px var(--gold)); }
        
        .wheel-outer { width: 285px; height: 285px; border-radius: 50%; z-index: 2; border: 2px solid #000; background: #1a1a1a; overflow: hidden; }
        #canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { background: linear-gradient(135deg, #800000 0%, #d4af37 100%); color: white; border: none; width: 90%; padding: 18px; font-size: 22px; border-radius: 16px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .shop { display: flex; gap: 10px; width: 95%; margin-top: 15px; }
        .item { background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px; border-radius: 15px; text-align: center; flex: 1; transition: 0.2s; color: var(--gold); }
        .item.active { border: 2.5px solid var(--gold); background: rgba(212, 175, 55, 0.2); transform: scale(1.05); color: #fff; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index:1000; flex-direction:column; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .card { background: white; width: 85%; border-radius: 25px; padding: 25px; color: #333; }
        .prize-row { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><div class="balance" id="balText">0 ⭐</div></div>
    <div class="info-btn" onclick="openPrizes()">🎁</div>
    <div class="wheel-container">
        <div class="lights-ring" id="ring"></div>
        <div class="pointer"></div>
        <div class="wheel-outer"><canvas id="canvas" width="500" height="500"></canvas></div>
    </div>
    <button class="spin-btn" id="mainBtn" onclick="spin()">ИГРАТЬ 🔥</button>
    <div class="shop">
        <div class="item active" id="p50" onclick="setPrice(50)">⭐ 50</div>
        <div class="item" id="p120" onclick="setPrice(120)">⭐ 120</div>
        <div class="item" id="p200" onclick="setPrice(200)">⭐ 200</div>
    </div>

    <div id="winModal" class="modal">
        <h1 style="color:var(--gold); text-align: center;">ТВОЙ ВЫИГРЫШ!</h1>
        <div id="winEmoji" style="font-size:120px; margin:20px"></div>
        <button class="spin-btn" style="width:240px" onclick="collect()">ЗАБРАТЬ ПРИЗ 🎁</button>
    </div>

    <div id="prizesModal" class="modal" onclick="this.style.display='none'">
        <div class="card" onclick="event.stopPropagation()">
            <h3 style="text-align:center; color:#800000; margin-top:0;">ПРИЗЫ</h3>
            <div id="list"></div>
            <button class="spin-btn" style="width:100%; margin-top:15px; padding:10px" onclick="document.getElementById('prizesModal').style.display='none'">ОК</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const prizeNames = {"🖼️":"Фото","🎥":"Видео","🏆":"Пак 8+2","🎰":"Пак 10+4","💄":"Секс","🍑":"Анал","🔥":"Минет","🍆":"Игрушка","🔑":"Приватка","☎️":"Звонок","❤️":"Вирт"};
        const sectors = Object.keys(prizeNames);
        let params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('balance')) || 0;
        let price = 50;
        let rotation = 0;

        document.getElementById('balText').innerText = balance + " ⭐";

        function animateBalance(target) {
            const start = balance + price;
            const duration = 800;
            const startTime = performance.now();
            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(start - (progress * price));
                document.getElementById('balText').innerText = current + " ⭐";
                if(progress < 1) requestAnimationFrame(update);
                else document.getElementById('balText').innerText = target + " ⭐";
            }
            requestAnimationFrame(update);
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            const arc = (Math.PI * 2) / sectors.length;
            ctx.save(); ctx.translate(250,250); ctx.rotate(-Math.PI/2); ctx.translate(-250,-250);
            sectors.forEach((s, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#3d0a0a" : "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = "#fff"; ctx.font = "bold 44px Arial"; ctx.fillText(s, 180, 15); ctx.restore();
            });
            ctx.restore();
        }

        const ring = document.getElementById('ring');
        for(let i=0; i<24; i++) {
            const led = document.createElement('div');
            led.className = 'led';
            led.style.transformOrigin = `50% 165px`;
            led.style.transform = `translateX(-50%) rotate(${i*15}deg)`;
            ring.appendChild(led);
        }
        setInterval(() => {
            document.querySelectorAll('.led').forEach((l, i) => {
                l.style.opacity = (Math.floor(Date.now()/150) + i) % 3 === 0 ? "1" : "0.3";
                l.style.boxShadow = l.style.opacity === "1" ? "0 0 10px #fff" : "none";
            });
        }, 50);

        function setPrice(p) {
            price = p;
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            document.getElementById('p'+p).classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function spin() {
            if(balance < price) return tg.showAlert("Мало звезд! ⭐");
            document.getElementById('mainBtn').disabled = true;
            balance -= price;
            animateBalance(balance);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            const hapticInterval = setInterval(() => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }, 100);

            const weights = [25, 25, 5, 4, 13, 13, 13, 2, 0, 0, 0];
            let rand = Math.random() * 100, sum = 0, target = 0;
            for(let i=0; i<weights.length; i++) { sum += weights[i]; if(rand <= sum) { target = i; break; } }

            const arc = 360 / sectors.length;
            const stopAt = (target * arc);
            rotation += 3600 + (360 - (rotation % 360)) + (360 - stopAt);
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                clearInterval(hapticInterval);
                document.getElementById('winEmoji').innerText = sectors[target];
                document.getElementById('winModal').style.display = 'flex';
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 } });
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 5000);
        }

        function collect() {
            const prize = document.getElementById('winEmoji').innerText;
            tg.sendData(price + "|" + prize);
            setTimeout(() => {
                tg.openTelegramLink("https://t.me/KittyCam78"); // ЗАМЕНИ НА СВОЙ НИК
                tg.close();
            }, 150);
        }

        function openPrizes() {
            document.getElementById('list').innerHTML = sectors.map(s => `<div class="prize-row"><span>${s}</span> <span>${prizeNames[s]}</span></div>`).join('');
            document.getElementById('prizesModal').style.display = 'flex';
        }

        draw(); tg.expand();
    </script>
</body>
</html>

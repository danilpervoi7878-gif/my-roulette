 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #4a0e0e; --gold: #d4af37; --soft-gold: #fcf1d1; }
        body { 
            background: radial-gradient(circle at top, #2c0a0a 0%, #050505 100%);
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 20px; color: var(--soft-gold); height: 100vh; overflow: hidden;
        }
        
        .header { 
            background: rgba(255, 255, 255, 0.05); padding: 10px 30px; border-radius: 20px; 
            margin-bottom: 20px; text-align: center; border: 1px solid var(--gold);
        }

        .balance { font-size: 28px; font-weight: bold; color: var(--gold); }
        
        .info-btn {
            position: absolute; right: 20px; top: 20px; width: 40px; height: 40px;
            background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold);
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100;
        }

        .wheel-container {
            position: relative; width: 320px; height: 320px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .lights-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: #111; border: 4px solid var(--gold); z-index: 1;
        }

        .led {
            position: absolute; width: 6px; height: 6px; background: #fff;
            border-radius: 50%; top: 6px; left: 50%; transform: translateX(-50%); z-index: 5;
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; 
            transform: translateX(-50%); width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid #ffffff; z-index: 110;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .wheel-outer {
            position: relative; width: 280px; height: 280px;
            border-radius: 50%; overflow: hidden; z-index: 2; border: 2px solid #000;
        }
        
        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { 
            background: linear-gradient(135deg, #800000 0%, #d4af37 100%);
            color: white; border: none; width: 90%; padding: 15px; font-size: 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index:1000; flex-direction:column; 
            align-items:center; justify-content:center;
        }
        .card { background: white; width: 80%; border-radius: 20px; padding: 20px; color: #333; }
        .item { background: rgba(0,0,0,0.3); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; flex: 1; text-align: center; font-size: 14px; }
        .item.active { background: rgba(212, 175, 55, 0.3); border: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; opacity: 0.8;">БАЛАНС</div>
        <div class="balance" id="balanceText">0 ⭐</div>
    </div>

    <div class="info-btn" onclick="toggleModal('prizesModal', true)">🎁</div>

    <div class="wheel-container">
        <div class="lights-ring" id="lightsRing"></div>
        <div class="pointer"></div>
        <div class="wheel-outer">
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="mainBtn" onclick="trySpin()">КРУТИТЬ 🔥</button>

    <div style="display:flex; gap:10px; width:90%; margin-top:15px;">
        <div class="item active" id="p50" onclick="setPrice(50)">⭐ 50</div>
        <div class="item" id="p120" onclick="setPrice(120)">⭐ 120</div>
        <div class="item" id="p200" onclick="setPrice(200)">⭐ 200</div>
    </div>

    <div id="prizesModal" class="modal">
        <div class="card">
            <h3 style="text-align:center">СПИСОК ПРИЗОВ</h3>
            <div id="list" style="max-height:250px; overflow-y:auto"></div>
            <button class="spin-btn" style="margin-top:10px; width:100%" onclick="toggleModal('prizesModal', false)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <h2 style="color:var(--gold)">ВЫИГРЫШ!</h2>
        <div id="res" style="font-size: 80px; margin: 20px;"></div>
        <button class="spin-btn" style="width:200px" onclick="collect()">ЗАБРАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('balance')) || 0;
        let price = 50;
        const prizes = { "💎":"Алмазы","💰":"Золото","🎟️":"Билет","🎁":"Бокс","⭐":"Звезды","🏆":"Кубок","🔥":"Огонь","🌈":"Радуга","🎰":"Слот","🎯":"Цель","⚡":"Молния","🎲":"Кости" };
        const sectors = Object.keys(prizes);
        
        document.getElementById('balanceText').innerText = balance + " ⭐";

        // Лампочки
        const ring = document.getElementById('lightsRing');
        for (let i = 0; i < 24; i++) {
            const led = document.createElement('div');
            led.className = 'led';
            led.style.transformOrigin = `50% 160px`;
            led.style.transform = `translateX(-50%) rotate(${i * 15}deg)`;
            ring.appendChild(led);
        }

        setInterval(() => {
            document.querySelectorAll('.led').forEach((l, i) => {
                l.style.opacity = (Math.floor(Date.now()/200) + i) % 3 === 0 ? "1" : "0.3";
            });
        }, 100);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            const arc = (Math.PI * 2) / sectors.length;
            sectors.forEach((s, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#4a0e0e" : "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.fillText(s, 170, 15); ctx.restore();
            });
        }

        function setPrice(p) {
            price = p;
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            document.getElementById('p'+p).classList.add('active');
        }

        function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        sectors.forEach(s => { document.getElementById('list').innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee">${s} - ${prizes[s]}</div>`; });

        let rot = 0;
        function trySpin() {
            if (balance < price) return tg.showAlert("Мало звезд!");
            balance -= price;
            document.getElementById('balanceText').innerText = balance + " ⭐";
            const add = 3600 + Math.random() * 3600;
            rot += add;
            canvas.style.transform = `rotate(${rot}deg)`;
            setTimeout(() => {
                const idx = Math.floor(((360 - (rot % 360)) % 360) / (360 / sectors.length));
                document.getElementById('res').innerText = sectors[idx];
                toggleModal('winModal', true);
                confetti({ particleCount: 100 });
            }, 4000);
        }

        function collect() {
            tg.sendData(price + "|" + document.getElementById('res').innerText);
            tg.close();
        }

        draw();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>

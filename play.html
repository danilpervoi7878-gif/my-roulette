<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #4a0e0e; --gold: #d4af37; --soft-gold: #fcf1d1; --pink: #ff4d8d; }
        body { 
            background: radial-gradient(circle at top, #2c0a0a 0%, #050505 100%);
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 20px; color: var(--soft-gold); height: 100vh; overflow: hidden;
        }
        
        .header { 
            background: rgba(255, 255, 255, 0.03); padding: 10px 35px; border-radius: 20px; 
            margin-bottom: 20px; text-align: center; border: 1.5px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .balance { font-size: 32px; font-weight: 800; color: var(--gold); }
        
        .info-btn {
            position: absolute; right: 20px; top: 100px; width: 45px; height: 45px;
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 60;
        }

        /* КОНТЕЙНЕР БАРАБАНА */
        .wheel-container {
            position: relative; width: 340px; height: 340px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
        }

        /* КОЛЬЦО С ЛАМПОЧКАМИ */
        .lights-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 4px solid var(--gold);
            z-index: 1; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .led {
            position: absolute; width: 8px; height: 8px; background: #fff;
            border-radius: 50%; top: 6px; left: 50%; transform: translateX(-50%);
            z-index: 5; transition: 0.2s;
        }

        /* УКАЗАТЕЛЬ (СТРЕЛОЧКА) */
        .pointer {
            position: absolute; top: -10px; left: 50%; 
            transform: translateX(-50%); width: 0; height: 0; 
            border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 30px solid #ffffff; z-index: 100;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
        }

        .wheel-outer {
            position: relative; width: 290px; height: 290px;
            border-radius: 50%; overflow: hidden; z-index: 2;
            box-shadow: inset 0 0 20px #000;
        }
        
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { 
            background: linear-gradient(135deg, #800000 0%, #d4af37 100%);
            color: white; border: none; width: 90%; padding: 18px; font-size: 22px; 
            border-radius: 15px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .modal-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index:1000; flex-direction:column; 
            align-items:center; justify-content:center; backdrop-filter: blur(8px);
        }
        .prizes-card { background: white; width: 85%; border-radius: 30px; padding: 25px; color: #4a0e0e; }
        .prize-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .close-prizes-btn { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 50px; font-weight: 900; margin-top: 15px; }

        .item { background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2);

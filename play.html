 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --accent-color: #00d2ff;
            --second-accent: #9d50bb;
            --glass: rgba(255, 255, 255, 0.07);
        }
        body { 
            background: radial-gradient(circle at top, #1b112e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
            color: white; 
            height: 100vh; 
            overflow: hidden;
            box-sizing: border-box;
        }
        
        /* Хедер с балансом */
        .header {
            background: var(--glass); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px;
            padding: 8px 25px; 
            text-align: center; 
            margin-bottom: 10px;
            margin-top: 5px;
        }
        .balance-value { font-size: 24px; font-weight: 900; color: var(--accent-color); }

        /* Контейнер колеса */
        .wheel-box { 
            position: relative; 
            width: 270px; 
            height: 270px; 
            margin-bottom: 15px; 
        }
        #canvas { 
            width: 100%; 
            height: 100%; 
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); 
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.2));
        }
        
        /* Указатель снизу */
        .arrow { 
            position: absolute; 
            bottom: -10px; 
            left: 50%; 
            transform: translateX(-50%) rotate(180deg);
            width: 0; 
            height: 0; 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent;
            border-top: 22px solid var(--accent-color); 
            z-index: 10;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        /* Кнопка КРУТИТЬ */
        .main-btn { 
            background: linear-gradient(45deg, var(--second-accent), var(--accent-color));
            color: white; 
            border: none; 
            width: 85%; 
            padding: 14px; 
            font-size: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); 
            margin-bottom: 15px;
            transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Магазин */
        .shop-container { 
            display: flex; 
            gap: 8px; 
            width: 100%;

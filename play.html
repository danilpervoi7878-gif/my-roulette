 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #2c0a0a; --gold: #d4af37; --soft-gold: #fcf1d1; --dark: #050505; }
        
        body { 
            background: radial-gradient(circle at top, var(--wine) 0%, var(--dark) 100%);
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 10px 20px; 
            color: var(--soft-gold); height: 100vh; overflow: hidden;
        }

        /* АНИМАЦИЯ ДЫХАНИЯ И МИГАНИЯ БАЛАНСА */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 4px 25px rgba(212, 175, 55, 0.2); }
        }

        .header { 
            background: rgba(212, 175, 55, 0.07); 
            padding: 10px 30px; border-radius: 20px; 
            margin-top: 15px; margin-bottom: 20px; 
            text-align: center; border: 1px solid rgba(212, 175, 55, 0.3);
            animation: breathe 3s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        /* Класс для мигания красным */
        .header.deduct {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.15);
            transform: scale(0.9) !important;
        }

        .balance { 
            font-size: 30px; font-weight: 800; color: var(--gold); 
            transition: color 0.3s ease;
        }
        
        .balance.low { color: #ff4444; }

        .info-btn {
            position: absolute; right: 20px; top: 25px; width: 42px; height: 42px;
            background: rgba(212, 175, 55, 0.15); border: 1.5px solid var(--gold);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; z-index: 100;
        }

        .wheel-container {
            position: relative; width: 330px; height: 330px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
        }

        .lights-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: #111; border: 4px solid var(--gold);
            box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 1;
        }

        .led {
            position: absolute; width: 7px; height: 7px; background: #fff;
            border-radius: 50%; top: 6px; left: 50%; transform: translateX(-50%);
            z-index: 5;
        }

        .pointer {
            position: absolute; top: -12px; left: 50%; 
            transform: translateX(-50%); width: 0; height: 0; 
            border-left: 16px solid transparent; border-right: 16px solid transparent; 
            border-top: 28px solid #ffffff; z-index: 110;
            filter: drop-shadow(0 0 8px var(--gold));
        }

        .wheel-outer {
            position: relative; width: 285px; height: 285px;
            border-radius: 50%; overflow: hidden; z-index: 2;
            box-shadow: inset 0 0 20px #000; border: 2px solid #000;
        }
        
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { 
            background: linear-gradient(135deg, #800000 0%, #d4af37 100%);
            color: white; border: none; width: 90%; padding: 18px; font-size: 22px; 
            border-radius: 16px; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); text-transform: uppercase;
        }

        .shop { display: flex; gap: 10px; width: 95%; margin-top: 15px; }
        .item { 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 12px; border-radius: 15px; text-align: center; flex: 1; transition: 0.3s;
        }
        .item.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.2); }

        .modal-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.92); z-index:1000; flex-direction:column; 
            align-items:center; justify-content:center; backdrop-filter: blur(10px);
        }
        .card { background: white; width: 85%; border-radius: 25px; padding: 25px; color: #333; }
        .prize-row { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #eee; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header" id="headerBox">
        <div style="font-size: 11px; opacity: 0.7; letter-spacing: 1px;">ВАШ БАЛАНС</div>
        <div class="balance" id="balanceText">0 ⭐</div>
    </div>

    <div class="info-btn" onclick="toggleModal('prizesModal', true)">🎁</div>

    <div class="wheel-container">
        <div class="lights-ring" id="lightsRing"></div>
        <div class="pointer"></div>
        <div class="wheel-outer">
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="mainBtn" onclick="trySpin()">КРУТИТЬ 🔥</button>

    <div class="shop">
        <div class="item active" id="p50" onclick="setPrice(50)">⭐ 50</div>
        <div class="item" id="p120" onclick="setPrice(120)">⭐ 120</div>
        <div class="item" id="p200" onclick="setPrice(200)">⭐ 200</div>
    </div>

    <div id="prizesModal" class="modal-overlay">
        <div class="card">
            <h3 style="text-align:center; color:#800000; margin-top:0;">СПИСОК ПРИЗОВ</h3>
            <div id="prizesList" style="max-height:300px; overflow-y:auto;"></div>
            <button class="spin-btn" style="width:100%; margin-top:15px;" onclick="toggleModal('prizesModal', false)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winModal" class="modal-overlay">
        <h2 style="color: var(--gold); font-size: 32px; margin-bottom: 0;">ПОЗДРАВЛЯЕМ!</h2>
        <div id="winEmoji" style="font-size: 100px; margin: 20px;"></div>
        <button class="spin-btn" style="width:auto; padding: 15px 60px;" onclick="collect()">ЗАБРАТЬ 🎁</button>
    </div>

        tg.setHeaderColor('#2c0a0a');

 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --wine: #4a0e0e; --gold: #d4af37; --dark: #121212; --soft-gold: #fcf1d1; 
        }
        body { 
            background: radial-gradient(circle, #2c0a0a 0%, #0a0a0a 100%);
            font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 20px; color: var(--soft-gold); height: 100vh; overflow: hidden;
        }
        .header { 
            background: rgba(255, 255, 255, 0.03); padding: 12px 35px; border-radius: 20px; 
            margin-bottom: 25px; text-align: center; border: 1px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .balance { font-size: 30px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }
        
        /* Колесо с обводкой */
        .wheel-container { 
            position: relative; width: 330px; height: 330px; margin-bottom: 25px;
            border-radius: 50%; padding: 8px; background: var(--gold); /* Это и есть внешняя золотая обводка */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        #canvas { 
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1);
            background: #1a1a1a;
        }
        .arrow { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; 
            border-right: 18px solid transparent; border-top: 30px solid var(--gold); 
            z-index: 10; filter: drop-shadow(0 0 5px black);
        }

        .spin-btn { 
            background: linear-gradient(135deg, #800000 0%, #d4af37 100%);
            color: white; border: none; width: 90%; padding: 18px; font-size: 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .spin-btn:active { transform: scale(0.98); }

        .shop { display: flex; gap: 12px; width: 100%; justify-content: center; margin-top: 5px; }
        .item { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 12px; border-radius: 15px; text-align: center; flex: 1; transition: 0.3s;
        }
        .item.active { 
            border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.15); 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); 
        }

        #modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); z-index:100; flex-direction:column; 
            align-items:center; justify-content:center; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 11px; opacity: 0.7; color: white;">ROYAL BALANCE</div>
        <div class="balance">2,500 💎</div>
    </div>

    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="mainBtn" onclick="trySpin()">SPIN WHEEL 🔥</button>

    <div class="shop">
        <div class="item active" onclick="selectItem(this, 50)">⭐ 50<br><small>1 SPIN</small></div>
        <div class="item" onclick="selectItem(this, 120)">⭐ 120<br><small>3 SPINS</small></div>
        <div class="item" onclick="selectItem(this, 200)">⭐ 200<br><small>5 SPINS</small></div>
    </div>

    <div id="modal">
        <h2 style="color: var(--gold); font-size: 32px; font-family: serif;">ROYAL WIN!</h2>
        <div id="prize" style="font-size: 90px; margin: 25px; filter: drop-shadow(0 0 15px var(--gold));"></div>
        <button class="spin-btn" style="width: auto; padding: 12px 50px;" onclick="collect()">CLAIM PRIZE 🎁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sectors = ["💎", "💰", "🎟️", "🎁", "⭐", "🏆", "🔥", "🌈", "🎰", "🎯", "⚡", "🎲"];
        
        let currentRotation = 0;
        let isSpinning = false;
        let selectedPrice = 50;

        function draw() {
            const arc = (2 * Math.PI) / sectors.length;
            for (let i = 0; i < sectors.length; i++) {
                ctx.fillStyle = (i % 2 === 0) ? "#4a0e0e" : "#1a1a1a"; // Бордовый и графит
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 245, i * arc, (i + 1) * arc); ctx.fill();
                
                // Тонкие золотые разделители
                ctx.strokeStyle = "rgba(212, 175, 55, 0.4)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * arc + arc / 2);
                ctx.fillStyle = "#fcf1d1"; ctx.font = "bold 42px Arial"; ctx.textAlign = "right";
                ctx.fillText(sectors[i], 220, 15); ctx.restore();
            }
        }

        function selectItem(el, price) {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            selectedPrice = price;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function trySpin() {
            if (isSpinning) return;
            if (selectedPrice > 50) {
                tg.showAlert("Insufficient Royal Balance! ⭐");
                return;
            }
            startSpin();
        }

        function startSpin() {
            isSpinning = true;
            document.getElementById('mainBtn').disabled = true;
            const spinAdd = Math.floor(3600 + Math.random() * 3600);
            currentRotation += spinAdd;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            let viber = setInterval(() => {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }, 100);

            setTimeout(() => {
                clearInterval(viber);
                const actual = currentRotation % 360;
                const idx = Math.floor(((360 - (actual % 360)) % 360) / (360 / sectors.length));
                const win = sectors[idx];
                
                document.getElementById('prize').innerText = win;
                document.getElementById('modal').style.display = 'flex';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                isSpinning = false;
            }, 4500);
        }

        function collect() {
            tg.sendData("spin_done");
            tg.close();
        }

        window.onload = () => { draw(); tg.expand(); };
        tg.ready();
    </script>
</body>
</html>

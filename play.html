<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #2c0a0a; --gold: #d4af37; --soft-gold: #fcf1d1; --dark: #050505; }
        body { 
            background: radial-gradient(circle at top, var(--wine) 0%, var(--dark) 100%);
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 10px 20px; color: var(--soft-gold); height: 100vh; overflow: hidden;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes gift-wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
        
        .header { background: rgba(212, 175, 55, 0.07); padding: 10px 30px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); animation: breathe 3s infinite ease-in-out; margin-top: 10px; }
        .balance { font-size: 30px; font-weight: 800; color: var(--gold); }
        .info-btn { position: absolute; right: 20px; top: 20px; width: 42px; height: 42px; background: rgba(212, 175, 55, 0.15); border: 1.5px solid var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; animation: gift-wiggle 2s infinite; z-index: 100; }

        .wheel-container { position: relative; width: 330px; height: 330px; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
        .lights-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #111; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .led { position: absolute; width: 7px; height: 7px; background: #fff; border-radius: 50%; top: 6px; left: 50%; transform: translateX(-50%); }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 28px solid #fff; z-index: 110; filter: drop-shadow(0 0 8px var(--gold)); }
        .wheel-outer { width: 285px; height: 285px; border-radius: 50%; z-index: 2; border: 2px solid #000; background: #1a1a1a; }
        #canvas { width: 100%; height: 100%; transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { background: linear-gradient(135deg, #800000 0%, #d4af37 100%); color: white; border: none; width: 90%; padding: 18px; font-size: 20px; border-radius: 16px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .shop { display: flex; gap: 10px; width: 95%; margin-top: 15px; }
        .item { background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px; border-radius: 15px; flex: 1; text-align: center; font-weight: bold; }
        .item.active { border: 2.5px solid var(--gold); background: rgba(212, 175, 55, 0.2); }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.94); z-index:1000; flex-direction:column; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .card { background: white; width: 85%; border-radius: 25px; padding: 25px; color: #333; }
        .prize-row { display: flex; align-items: center; gap: 15px; padding: 8px 0; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; opacity: 0.7; letter-spacing: 1px;">ВАШ БАЛАНС</div>
        <div class="balance" id="balText">0 ⭐</div>
    </div>

    <div class="info-btn" onclick="openModal('prizesModal')">🎁</div>

    <div class="wheel-container">
        <div class="lights-ring" id="ring"></div>
        <div class="pointer"></div>
        <div class="wheel-outer"><canvas id="canvas" width="500" height="500"></canvas></div>
    </div>

    <button class="spin-btn" id="mainBtn" onclick="spin()">КРУТИТЬ 🔥</button>

    <div class="shop">
        <div class="item active" id="p50" onclick="setPrice(50)">⭐ 50</div>
        <div class="item" id="p120" onclick="setPrice(120)">⭐ 120</div>
        <div class="item" id="p200" onclick="setPrice(200)">⭐ 200</div>
    </div>

    <div id="prizesModal" class="modal">
        <div class="card">
            <h3 style="text-align:center; color:#800000; margin:0 0 15px 0;">СПИСОК ПРИЗОВ</h3>
            <div id="pList" style="max-height:300px; overflow-y:auto;"></div>
            <button class="spin-btn" style="width:100%; margin-top:15px;" onclick="closeModal('prizesModal')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <h2 style="color:var(--gold); margin:0;">ВЫИГРЫШ!</h2>
        <div id="winEmoji" style="font-size:100px; margin:20px;"></div>
        <button class="spin-btn" style="width:200px" onclick="collect()">ЗАБРАТЬ 🎁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('balance')) || 0;
        let currentPrice = 50;
        
        // НОВЫЙ СПИСОК ПРИЗОВ
        const prizeNames = { 
            "🖼️":"Фото (Single)","🎥":"Видео (Full)","🏆":"Пак 8+2","🎰":"Пак 10+4","💄":"Секс","🍑":"Анал","🔥":"Минет","🍆":"Игрушка","🔑":"Приватка","☎️":"Звонок","❤️":"Вирт"
        };
        const sectors = Object.keys(prizeNames);
        
        document.getElementById('balText').innerText = balance + " ⭐";

        // Отрисовка списка
        const pList = document.getElementById('pList');
        sectors.forEach(s => {
            pList.innerHTML += `<div class="prize-row"><span>${s}</span> <span style="color:#800000">${prizeNames[s]}</span></div>`;
        });

        // Лампочки
        const ring = document.getElementById('ring');
        for (let i = 0; i < 24; i++) {
            const led = document.createElement('div');
            led.className = 'led';
            led.style.transformOrigin = `50% 165px`;
            led.style.transform = `translateX(-50%) rotate(${i * 15}deg)`;
            ring.appendChild(led);
        }
        setInterval(() => {
            document.querySelectorAll('.led').forEach((l, i) => {
                l.style.opacity = (Math.floor(Date.now()/200) + i) % 3 === 0 ? "1" : "0.3";
            });
        }, 100);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            const arc = (Math.PI * 2) / sectors.length;
            sectors.forEach((s, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#4a0e0e" : "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "right";
                ctx.fillText(s, 230, 15); ctx.restore();
            });
        }

        function setPrice(p) {
            currentPrice = p;
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            document.getElementById('p'+p).classList.add('active');
        }

        let rotation = 0;
        function spin() {

 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #2c0a0a; --gold: #d4af37; --soft-gold: #fcf1d1; --dark: #050505; }
        body { 
            background: radial-gradient(circle at top, var(--wine) 0%, var(--dark) 100%);
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 15px; color: var(--soft-gold); 
            height: 100vh; overflow: hidden;
        }
        .header { background: rgba(212, 175, 55, 0.1); padding: 10px 30px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 10px; }
        .balance { font-size: 28px; font-weight: bold; color: var(--gold); }
        .info-btn { position: absolute; right: 20px; top: 25px; width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; }
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 25px 0; }
        .lights-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--gold); box-shadow: 0 0 15px var(--gold); background: #111; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 100; }
        .wheel-outer { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; position: relative; }
        #canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .spin-btn { background: linear-gradient(135deg, #800000 0%, #d4af37 100%); color: white; border: none; width: 90%; padding: 18px; font-size: 22px; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        .card { background: white; width: 80%; border-radius: 20px; padding: 20px; color: #333; }
        .prize-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="header"><div class="balance" id="bal">1000 ⭐</div></div>
    <div class="info-btn" onclick="openModal('prizesModal')">🎁</div>
    <div class="wheel-container">
        <div class="lights-ring"></div><div class="pointer"></div>
        <div class="wheel-outer"><canvas id="canvas" width="500" height="500"></canvas></div>
    </div>
    <button class="spin-btn" id="mainBtn" onclick="spin()">КРУТИТЬ 🔥</button>

    <div id="prizesModal" class="modal" onclick="closeModal('prizesModal')">
        <div class="card" onclick="event.stopPropagation()">
            <h3 style="text-align:center; color:#800000">ПРИЗЫ</h3>
            <div id="prizeList"></div>
            <button class="spin-btn" style="width:100%; margin-top:15px; padding:10px" onclick="closeModal('prizesModal')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <h2 style="color:var(--gold)">ВЫИГРЫШ!</h2>
        <div id="winEmoji" style="font-size:80px; margin:20px"></div>
        <button class="spin-btn" style="width:200px" onclick="collect()">ЗАБРАТЬ 🎁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        // ТВОИ НОВЫЕ ПРИЗЫ
        const prizeNames = { 
            "🖼️":"Фото (Single)","🎥":"Видео (Full)","🏆":"Пак 8+2","🎰":"Пак 10+4","💄":"Секс","🍑":"Анал","🔥":"Минет","🍆":"Игрушка","🔑":"Приватка","☎️":"Звонок","❤️":"Вирт"
        };
        const sectors = Object.keys(prizeNames);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const arc = (Math.PI * 2) / sectors.length;
            sectors.forEach((s, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#4a0e0e" : "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "right";
                ctx.fillText(s, 230, 15); ctx.restore();
            });
        }

        let rotation = 0;
        function spin() {
            document.getElementById('mainBtn').disabled = true;
            const extra = 3600 + Math.random() * 360;
            rotation += extra;
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const idx = Math.floor(((360 - (rotation % 360)) % 360) / (360 / sectors.length));
                document.getElementById('winEmoji').innerText = sectors[idx];
                document.getElementById('winModal').style.display = 'flex';
                confetti();
            }, 5000);
        }

        function collect() {
            const win = document.getElementById('winEmoji').innerText;
            tg.sendData("claim|" + win);
            tg.close();
        }

        function openModal(id) {
            const list = document.getElementById('prizeList');
            list.innerHTML = sectors.map(s => `<div class="prize-item"><span>${s}</span> <span>${prizeNames[s]}</span></div>`).join('');
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        draw(); tg.expand();
    </script>
</body>
</html>

 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --wine: #4a0e0e; --gold: #d4af37; --soft-gold: #fcf1d1; --pink: #ff4d8d; }
        body { 
            background: radial-gradient(circle at top, #2c0a0a 0%, #050505 100%);
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; margin: 0; padding: 20px; color: var(--soft-gold); height: 100vh; overflow: hidden;
        }
        
        .header { 
            background: rgba(255, 255, 255, 0.03); padding: 10px 35px; border-radius: 20px; 
            margin-bottom: 20px; text-align: center; border: 1.5px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .balance { font-size: 32px; font-weight: 800; color: var(--gold); }
        
        /* Кнопка ИНФО сбоку */
        .info-btn {
            position: absolute; right: 20px; top: 100px; width: 45px; height: 45px;
            background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 50;
        }

        .wheel-outer {
            position: relative; width: 320px; height: 320px; margin-bottom: 25px;
            border-radius: 50%; padding: 10px; 
            background: linear-gradient(135deg, #d4af37 0%, #8a6d1d 50%, #d4af37 100%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { 
            background: linear-gradient(135deg, #800000 0%, #d4af37 100%);
            color: white; border: none; width: 90%; padding: 18px; font-size: 22px; 
            border-radius: 15px; font-weight: 900; cursor: pointer;
        }

        /* Модальные окна */
        .modal-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.85); z-index:100; flex-direction:column; 
            align-items:center; justify-content:center; backdrop-filter: blur(8px);
        }

        /* Окно списка призов как на скрине */
        .prizes-card {
            background: white; width: 85%; max-width: 320px; border-radius: 30px;
            padding: 25px; color: #4a0e0e; position: relative;
        }
        .prizes-title { 
            text-align: center; font-size: 20px; font-weight: 900; 
            color: #800000; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .prize-item {
            display: flex; align-items: center; gap: 15px; padding: 10px 0;
            border-bottom: 1px solid #f0f0f0; font-weight: 600;
        }
        .prize-icon { font-size: 24px; width: 30px; }
        .prize-text { color: #ff4d8d; flex-grow: 1; }
        
        .close-prizes-btn {
            background: var(--pink); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 50px; font-weight: 900; margin-top: 20px; font-size: 18px;
        }

        .item { background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px; border-radius: 18px; text-align: center; flex: 1; transition: 0.3s; }
        .item.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 11px; opacity: 0.8;">ВАШ БАЛАНС</div>
        <div class="balance" id="balanceText">0 ⭐</div>
    </div>

    <div class="info-btn" onclick="togglePrizes(true)">🎁</div>

    <div class="wheel-outer">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="mainBtn" onclick="trySpin()">КРУТИТЬ 🔥</button>

    <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
        <div class="item active" onclick="selectItem(this, 50)">⭐ 50</div>
        <div class="item" onclick="selectItem(this, 120)">⭐ 120</div>
        <div class="item" onclick="selectItem(this, 200)">⭐ 200</div>
    </div>

    <div id="prizesModal" class="modal-overlay">
        <div class="prizes-card">
            <div class="prizes-title">🎁 СПИСОК ПРИЗОВ</div>
            <div id="prizesList" style="max-height: 350px; overflow-y: auto;">
                </div>
            <button class="close-prizes-btn" onclick="togglePrizes(false)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winModal" class="modal-overlay">
        <h2 style="color: var(--gold); font-size: 36px;">ВЫИГРЫШ!</h2>
        <div id="prizeResult" style="font-size: 100px; margin: 20px;"></div>
        <button class="spin-btn" style="width:auto; padding: 15px 50px;" onclick="collect()">ЗАБРАТЬ 🎁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const urlParams = new URLSearchParams(window.location.search);
        let currentBalance = parseInt(urlParams.get('balance')) || 0;
        let selectedPrice = 50;
        let winningPrize = "";

        // Названия призов как на скрине
        const prizeNames = {
            "💎": "Алмазный Набор", "💰": "Мешок Монет", "🎟️": "VIP Билет",
            "🎁": "Секретный Бокс", "⭐": "Бонусные Звезды", "🏆": "Кубок Чемпиона",
            "🔥": "Мега Множитель", "🌈": "Радужный Спин", "🎰": "Джекпот",
            "🎯": "Точное Попадание", "⚡": "Мгновенный Спин", "🎲": "Кости Удачи"
        };

        const sectors = Object.keys(prizeNames);
        document.getElementById('balanceText').innerText = currentBalance + " ⭐";

        // Заполнение списка призов
        const listDiv = document.getElementById('prizesList');
        sectors.forEach(s => {
            listDiv.innerHTML += `
                <div class="prize-item">
                    <div class="prize-icon">${s}</div>
                    <div class="prize-text">${prizeNames[s]}</div>
                </div>`;
        });

        function togglePrizes(show) {
            document.getElementById('prizesModal').style.display = show ? 'flex' : 'none';
            if (show && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;

        function draw() {
            const arc = (2 * Math.PI) / sectors.length;
            for (let i = 0; i < sectors.length; i++) {
                ctx.fillStyle = (i % 2 === 0) ? "#4a0e0e" : "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 245, i * arc, (i + 1) * arc); ctx.fill();
                ctx.strokeStyle = "rgba(212, 175, 55, 0.3)"; ctx.lineWidth = 2; ctx.stroke();
                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * arc + arc / 2);
                ctx.fillStyle = "#fcf1d1"; ctx.font = "bold 44px Arial"; ctx.textAlign = "right";
                ctx.fillText(sectors[i], 220, 15); ctx.restore();
            }
        }

        function selectItem(el, price) {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active'); selectedPrice = price;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function trySpin() {
            if (isSpinning) return;
            if (currentBalance < selectedPrice) {
                tg.showAlert("Недостаточно баланса! ⭐"); return;
            }
            startSpin();
        }

        function startSpin() {
            isSpinning = true;
            document.getElementById('mainBtn').disabled = true;
            currentBalance -= selectedPrice;
            document.getElementById('balanceText').innerText = currentBalance + " ⭐";

            const spinAdd = Math.floor(3600 + Math.random() * 3600);
            currentRotation += spinAdd;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actual = currentRotation % 360;
                const idx = Math.floor(((360 - (actual % 360)) % 360) / (360 / sectors.length));
                winningPrize = sectors[idx];
                document.getElementById('prizeResult').innerText = winningPrize;
                document.getElementById('winModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                isSpinning = false;
            }, 4500);
        }

        function collect() {
            tg.sendData(selectedPrice + "|" + winningPrize);
            tg.close();
        }

        window.onload = () => { draw(); tg.expand(); };
        tg.ready();
    </script>
</body>
</html>
